{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Intelligent Research Assistant</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to access your research space</p>
            </div>

            {% if error %}
            <div class="alert">
                {{ error }}
            </div>
            {% endif %}

            <form action="{% url 'login' %}" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" class="auth-btn">Log In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="{% url 'signup' %}" class="auth-link">Create one now</a>
            </div>
        </div>
    </div>
</body>
</html>
